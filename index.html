<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>KAMERA OK</title>
</head>

<body>

<h2>KAMERA TEST</h2>

<button onclick="start()">START</button>

<video id="v" autoplay playsinline style="width:300px;"></video>

<p id="status">czekam...</p>

<script>

async function start() {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    document.getElementById("v").srcObject = stream;

    document.getElementById("status").innerText = "kamera działa ✔";

  } catch (e) {

    document.getElementById("status").innerText = e.name + ": " + e.message;

  }

}

</script>

</body>
</html>
