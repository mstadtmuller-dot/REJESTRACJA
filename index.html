<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Check-in</title>

  <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    video { width: 300px; margin-top: 10px; }
    canvas { display: none; }
    #result { margin-top: 15px; font-size: 18px; font-weight: bold; }
    button { padding: 10px 15px; margin-bottom: 10px; }
  </style>
</head>

<body>

<h2>SKANER QR</h2>

<button onclick="start()">START</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<p id="result">Czekam...</p>

<script>

const API_URL = "WSTAW_TUTAJ_LINK_APPS_SCRIPT";

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let scanning = false;

async function start() {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    scanning = true;

    scanLoop();

    document.getElementById("result").innerText = "KAMERA OK";

  } catch (e) {

    document.getElementById("result").innerText = "BŁĄD KAMERY: " + e.message;

  }

}

function scanLoop() {

  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    const code = jsQR(imageData.data, imageData.width, imageData.height);

    if (code) {

      scanning = false;

      handleQR(code.data);

      return;
    }
  }

  requestAnimationFrame(scanLoop);
}

function handleQR(text) {

  document.getElementById("result").innerText = "Sprawdzanie...";

  fetch(API_URL + "?id=" + encodeURIComponent(text))
    .then(res => res.text())
    .then(data => {
      document.getElementById("result").innerText = data;
    })
    .catch(() => {
      document.getElementById("result").innerText = "Błąd połączenia";
    });

}

</script>

</body>
</html>
