<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skaner QR</title>

  <!-- 📌 BIBLIOTEKA QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    .box {
      margin-top: 20px;
      font-size: 18px;
    }

    .error {
      color: red;
    }

    .ok {
      color: green;
    }
  </style>
</head>

<body>

<h2>📷 Skaner QR</h2>

<div id="reader"></div>

<div class="box" id="status">Czekam na skan...</div>

<script>

  // =========================
  // 🔴 TU WPISUJESZ SWOJE DANE
  // =========================

  const API_URL = "https://script.google.com/a/macros/uw.edu.pl/s/AKfycbwEGXkMpsaG6zW_eR5fEZSTF2ds3DIGFuDli_Y8genzLPUEByof93F83J4GglEvk91A/exec"; 
  // np. https://script.google.com/macros/s/XXXX/exec

  const REDIRECT_AFTER_SCAN = "https://mstadtmuller-dot.github.io/REJESTRACJA/success.html";
  // np. "https://twojastrona.pl/success.html"
  // albo zostaw null

  // =========================


  function onScanSuccess(decodedText, decodedResult) {
    console.log("QR:", decodedText);

    document.getElementById("status").innerHTML =
      "✅ Zeskanowano: " + decodedText;

    // jeśli NIE masz backendu → tylko pokazuj wynik
    if (!API_URL || API_URL.includes("TUTAJ")) {
      return;
    }

    // wysyłka do API (Google Script / backend)
    fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        qr: decodedText
      })
    })
    .then(res => res.text())
    .then(data => {
      document.getElementById("status").innerHTML =
        "📡 Wysłano do serwera: " + data;

      if (REDIRECT_AFTER_SCAN) {
        window.location.href = REDIRECT_AFTER_SCAN;
      }
    })
    .catch(err => {
      document.getElementById("status").innerHTML =
        "❌ Błąd połączenia z API";
      console.error(err);
    });
  }


  function onScanFailure(error) {
    // ignorujemy błędy skanowania (normalne)
  }


  // start kamery
  const html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

      const cameraId = devices[0].id;

      html5QrCode.start(
        cameraId,
        {
          fps: 10,
          qrbox: 250
        },
        onScanSuccess,
        onScanFailure
      );

    } else {
      document.getElementById("status").innerHTML =
        "❌ Brak kamery";
    }

  }).catch(err => {
    document.getElementById("status").innerHTML =
      "❌ Kamera niedostępna: " + err;
  });

</script>

</body>
</html>
