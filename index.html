<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skaner QR</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #reader { width: 300px; margin: auto; }
    button { font-size: 18px; padding: 10px; margin-top: 20px; }
    #result { margin-top: 20px; }
  </style>
</head>

<body>

<h2>Skaner QR</h2>

<button onclick="startScanner()">▶ Start kamery</button>

<div id="reader"></div>
<div id="result">Kliknij Start</div>

<script>

const API_URL = "WSTAW_TUTAJ_LINK_APPS_SCRIPT";

function onScanSuccess(decodedText) {

  document.getElementById("result").innerText = "Sprawdzanie...";

  fetch(API_URL + "?id=" + encodeURIComponent(decodedText))
    .then(res => res.text())
    .then(text => {
      document.getElementById("result").innerText = text;
    });
}

function startScanner() {

  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).then(() => {
    document.getElementById("result").innerText = "Kamera aktywna";
  }).catch(err => {
    document.getElementById("result").innerText =
      "Błąd kamery: " + err;
  });

}

</script>

</body>
</html>
