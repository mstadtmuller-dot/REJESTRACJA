<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CAMERA TEST</title>
</head>

<body>

<h2>TEST KAMERY</h2>

<button onclick="start()">START KAMERY</button>

<video id="video" autoplay playsinline style="width:300px;"></video>

<p id="status">czekam...</p>

<script>

async function start() {

  const status = document.getElementById("status");
  const video = document.getElementById("video");

  try {

    status.innerText = "start...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    status.innerText = "KAMERA DZIAŁA ✔";

  } catch (e) {

    status.innerText = "ERROR: " + e.name + " - " + e.message;

  }

}

</script>

</body>
</html>
