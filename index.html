<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Check-in QR</title>

  <!-- QR decoder -->
  <script src="https://unpkg.com/jsqr/dist/jsQR.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    video {
      width: 320px;
      margin-top: 10px;
      border-radius: 10px;
    }

    canvas {
      display: none;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>SKANER QR CHECK-IN</h2>

<button onclick="startCamera()">START KAMERY</button>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<p id="result">Czekam na skan...</p>

<script>

////////////////////////////////////////////////////
// 🔴 1. TU WSTAWIASZ SWÓJ LINK Z APPS SCRIPT
////////////////////////////////////////////////////

const API_URL = "https://script.google.com/a/macros/uw.edu.pl/s/AKfycbxKIM1G4Mh1-I4cBxv6HIASYwq55MazbHq4nBTGgb5566FHEnRCSHBl36sXgvNnlQ8P/exec";

////////////////////////////////////////////////////

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let scanning = false;

async function startCamera() {

  try {

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });

    video.srcObject = stream;

    scanning = true;

    scanLoop();

    document.getElementById("result").innerText = "Kamera aktywna...";

  } catch (err) {

    document.getElementById("result").innerText =
      "Błąd kamery: " + err.message;

  }
}

function scanLoop() {

  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(
      0, 0,
      canvas.width,
      canvas.height
    );

    const code = jsQR(imageData.data, imageData.width, imageData.height);

    if (code) {

      scanning = false;

      sendToServer(code.data);

      return;
    }
  }

  requestAnimationFrame(scanLoop);
}

function sendToServer(qrText) {

  document.getElementById("result").innerText = "Sprawdzanie...";

  fetch(API_URL + "?id=" + encodeURIComponent(qrText))
    .then(res => res.text())
    .then(data => {

      document.getElementById("result").innerText = data;

      // opcjonalnie restart skanowania po 2s
      setTimeout(() => {
        scanning = true;
        scanLoop();
      }, 2000);

    })
    .catch(err => {

      document.getElementById("result").innerText =
        "Błąd połączenia: " + err.message;

    });
}

</script>

</body>
</html>
