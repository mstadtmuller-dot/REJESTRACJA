<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skaner QR</title>

  <style>
    body { font-family: Arial; text-align: center; }
    video { width: 300px; margin-top: 10px; }
    #result { margin-top: 20px; font-size: 18px; }
  </style>
</head>

<body>

<h2>Skaner QR</h2>

<button onclick="startCamera()">▶ Start kamery</button>

<video id="video" autoplay></video>

<div id="result">Czekam...</div>

<script>

const API_URL = "WSTAW_TUTAJ_LINK_APPS_SCRIPT";

function startCamera() {

  const video = document.getElementById('video');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(stream => {
      video.srcObject = stream;
      document.getElementById("result").innerText = "Kamera działa (ale jeszcze bez skanera QR)";
    })
    .catch(err => {
      document.getElementById("result").innerText = "Brak dostępu do kamery: " + err;
    });

}

</script>

</body>
</html>
