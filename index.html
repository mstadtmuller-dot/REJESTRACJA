<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skaner QR - Check-in</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    #reader {
      width: 300px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<h2>Skaner QR - Check-in</h2>

<button onclick="startScanner()">▶ Start skanera</button>

<div id="reader"></div>
<div id="result">Kliknij Start</div>

<script>

const API_URL = "WSTAW_TUTAJ_LINK_APPS_SCRIPT";

let scanner;

function onScanSuccess(decodedText) {

  document.getElementById("result").innerText = "Sprawdzanie...";

  fetch(API_URL + "?id=" + encodeURIComponent(decodedText))
    .then(res => res.text())
    .then(text => {
      document.getElementById("result").innerText = text;
    })
    .catch(err => {
      document.getElementById("result").innerText = "Błąd połączenia: " + err;
    });
}

function startScanner() {

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).then(() => {
    document.getElementById("result").innerText = "Skaner aktywny";
  }).catch(err => {
    document.getElementById("result").innerText = "Błąd kamery: " + err;
  });

}

</script>

</body>
</html>
