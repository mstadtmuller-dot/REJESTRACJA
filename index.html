<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skaner QR</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    #reader {
      width: 300px;
      margin: auto;
      border: 2px solid #ddd;
      border-radius: 10px;
      background: white;
    }

    .box {
      margin-top: 20px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<h2>📷 Skaner QR</h2>

<div id="reader"></div>
<div class="box" id="status">Czekam na skan...</div>

<script>

const API_URL = "https://script.google.com/macros/s/uw.edu.pl/s/AKfycbwEGXkMpsaG6zW_eR5fEZSTF2ds3DIGFuDli_Y8genzLPUEByof93F83J4GglEvk91A/exec"; 

  
const REDIRECT_AFTER_SCAN = null;

function onScanSuccess(decodedText) {

  document.getElementById("status").innerHTML =
    "✅ Skan: " + decodedText;

  // 📌 POPRAWNE WYWOŁANIE API (GET)
  fetch(API_URL + "?qr=" + encodeURIComponent(decodedText))
    .then(res => res.text())
    .then(data => {
      document.getElementById("status").innerHTML =
        "📡 Odpowiedź: " + data;

      if (REDIRECT_AFTER_SCAN) {
        setTimeout(() => {
          window.location.href = REDIRECT_AFTER_SCAN;
        }, 800);
      }
    })
    .catch(err => {
      console.error(err);
      document.getElementById("status").innerHTML =
        "❌ Błąd połączenia z API";
    });
}

// 📷 kamera (tylna)
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {

  let cameraId = devices[0].id;

  for (let d of devices) {
    const label = (d.label || "").toLowerCase();
    if (label.includes("back") || label.includes("rear")) {
      cameraId = d.id;
    }
  }

  html5QrCode.start(
    cameraId,
    { fps: 10, qrbox: 200 },
    onScanSuccess
  );

});

</script>

</body>
</html>
