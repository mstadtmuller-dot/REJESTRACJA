<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TEST KAMERY</title>
  <style>
    body { font-family: Arial; text-align: center; }
    video { width: 320px; margin-top: 10px; }
    #status { margin-top: 15px; font-weight: bold; }
  </style>
</head>

<body>

<h2>TEST KAMERY</h2>

<button id="start">Start kamery</button>

<div id="status">Czekam...</div>
<video id="video" autoplay playsinline></video>

<script>

document.getElementById("start").addEventListener("click", async () => {

  const status = document.getElementById("status");
  const video = document.getElementById("video");

  try {

    status.innerText = "Uruchamianie...";

    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });

    video.srcObject = stream;

    status.innerText = "KAMERA DZIAŁA ✔";

  } catch (err) {
    status.innerText = "BŁĄD: " + err.name + " - " + err.message;
  }

});

</script>

</body>
</html>
