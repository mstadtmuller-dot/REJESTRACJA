<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Check-in QR</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.10/html5-qrcode.min.js"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    #reader { width: 300px; margin: auto; }
    #result { margin-top: 15px; font-size: 18px; font-weight: bold; }
    button { padding: 10px 15px; font-size: 16px; margin-bottom: 10px; }
  </style>
</head>

<body>

<h2>SKANER QR</h2>

<button onclick="startScanner()">START SKANERA</button>

<div id="reader"></div>
<div id="result">Czekam...</div>

<script>

const API_URL = "WSTAW_TUTAJ_LINK_APPS_SCRIPT";

let scanner;

function onScanSuccess(decodedText) {

  document.getElementById("result").innerText = "Sprawdzanie...";

  scanner.pause(); // ważne — żeby nie skanował 20x

  fetch(API_URL + "?id=" + encodeURIComponent(decodedText))
    .then(res => res.text())
    .then(text => {
      document.getElementById("result").innerText = text;

      setTimeout(() => {
        scanner.resume();
      }, 2000);

    })
    .catch(() => {
      document.getElementById("result").innerText = "Błąd połączenia";
      scanner.resume();
    });
}

function startScanner() {

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (devices && devices.length) {

      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
      ).then(() => {
        document.getElementById("result").innerText = "SKANER AKTYWNY";
      });

    } else {
      document.getElementById("result").innerText = "Brak kamery";
    }

  });

}

</script>

</body>
</html>
