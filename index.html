<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Skaner QR</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>Skaner QR</h2>

<div id="reader"></div>
<div id="result">Czekam na skan...</div>

<script>

const API_URL = "WSTAW_TUTAJ_LINK_APPS_SCRIPT";

function onScanSuccess(decodedText) {

  document.getElementById("result").innerText = "Sprawdzanie...";

  fetch(API_URL + "?id=" + encodeURIComponent(decodedText))
    .then(res => res.text())
    .then(text => {
      document.getElementById("result").innerText = text;
    })
    .catch(err => {
      document.getElementById("result").innerText = "Błąd połączenia";
    });
}

function startScanner() {
  const html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
  ).catch(err => {
    document.getElementById("result").innerText =
      "Nie można uruchomić kamery: " + err;
  });
}

startScanner();

</script>

</body>
</html>
